name: Update Dashboard Data

on:
  schedule:
    # Monday 09:30 TPE (01:30 UTC)
    - cron: '30 1 * * 1'
  workflow_dispatch:
    inputs:
      week:
        description: 'Week to generate (e.g. 2026-W07). Leave empty for previous week.'
        required: false

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout dashboard repo
        uses: actions/checkout@v4

      - name: Checkout claude workspace
        uses: actions/checkout@v4
        with:
          repository: dans-huang/CC
          token: ${{ secrets.CLAUDE_REPO_PAT }}
          path: claude-workspace

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests google-auth google-auth-oauthlib google-auth-httplib2 google-api-python-client

      - name: Setup and refresh Google credentials
        run: |
          # Scripts expect token at hardcoded path /Users/nativepg/Claude/.google-tokens.json
          sudo mkdir -p /Users/nativepg/Claude
          echo '${{ secrets.GOOGLE_TOKENS_JSON }}' | sudo tee /Users/nativepg/Claude/.google-tokens.json > /dev/null
          sudo chmod 666 /Users/nativepg/Claude/.google-tokens.json

          # Refresh the access token using credentials embedded in the token file
          python3 -c "
          import json, requests
          token_path = '/Users/nativepg/Claude/.google-tokens.json'
          with open(token_path) as f:
              tokens = json.load(f)
          resp = requests.post('https://oauth2.googleapis.com/token', data={
              'client_id': tokens['client_id'],
              'client_secret': tokens['client_secret'],
              'refresh_token': tokens['refresh_token'],
              'grant_type': 'refresh_token'
          })
          if resp.status_code != 200:
              raise RuntimeError(f'Token refresh failed: {resp.text}')
          tokens['access_token'] = resp.json()['access_token']
          with open(token_path, 'w') as f:
              json.dump(tokens, f, indent=2)
          print(f'Token refreshed (expires in {resp.json().get(\"expires_in\", \"?\")}s)')
          "

      - name: Generate dashboard data
        env:
          ZENDESK_SUBDOMAIN: positivegrid
          ZENDESK_EMAIL: ${{ secrets.ZENDESK_EMAIL }}
          ZENDESK_API_TOKEN: ${{ secrets.ZENDESK_TOKEN }}
          ZENDESK_TOKEN: ${{ secrets.ZENDESK_TOKEN }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_TOKEN }}
          QASE_API_TOKEN: ${{ secrets.QASE_TOKEN }}
          CLAUDE_DIR: claude-workspace
        run: |
          WEEK="${{ github.event.inputs.week || '' }}"
          if [ -z "$WEEK" ]; then
            # On Monday, generate for the PREVIOUS (completed) week, not the current one
            # 7 days ago from Monday = previous Monday = start of previous week
            WEEK=$(python3 -c "
          from datetime import datetime, timedelta
          last_week = datetime.utcnow() - timedelta(days=7)
          print(f'{last_week.isocalendar()[0]}-W{last_week.isocalendar()[1]:02d}')
          ")
          fi
          echo "Generating data for week: $WEEK"
          bash scripts/generate-dashboard-data.sh "$WEEK"

      - name: Validate and update index
        run: |
          python3 scripts/update-index.py

      - name: Commit and push data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "data: update dashboard for $(date -u +%Y-%m-%d)"
          git push

  deploy:
    needs: update-data
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
