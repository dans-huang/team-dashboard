name: Update Daily Data

on:
  schedule:
    # Every day at 09:30 TPE (01:30 UTC)
    - cron: '30 1 * * *'
  workflow_dispatch:
    inputs:
      date:
        description: 'Date to generate (YYYY-MM-DD). Leave empty for yesterday + backfill.'
        required: false

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update-daily:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout dashboard repo
        uses: actions/checkout@v4

      - name: Checkout claude workspace
        uses: actions/checkout@v4
        with:
          repository: dans-huang/CC
          token: ${{ secrets.CLAUDE_REPO_PAT }}
          path: claude-workspace

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests google-auth google-auth-oauthlib google-auth-httplib2 google-api-python-client

      - name: Setup and refresh Google credentials
        env:
          CLAUDE_DIR: claude-workspace
        run: |
          sudo mkdir -p /Users/nativepg/Claude
          echo '${{ secrets.GOOGLE_TOKENS_JSON }}' | sudo tee /Users/nativepg/Claude/.google-tokens.json > /dev/null
          sudo chmod 666 /Users/nativepg/Claude/.google-tokens.json

          # Refresh the access token using credentials embedded in the token file
          python3 -c "
          import json, requests
          token_path = '/Users/nativepg/Claude/.google-tokens.json'
          with open(token_path) as f:
              tokens = json.load(f)
          resp = requests.post('https://oauth2.googleapis.com/token', data={
              'client_id': tokens['client_id'],
              'client_secret': tokens['client_secret'],
              'refresh_token': tokens['refresh_token'],
              'grant_type': 'refresh_token'
          })
          if resp.status_code != 200:
              raise RuntimeError(f'Token refresh failed: {resp.text}')
          tokens['access_token'] = resp.json()['access_token']
          with open(token_path, 'w') as f:
              json.dump(tokens, f, indent=2)
          print(f'Token refreshed (expires in {resp.json().get(\"expires_in\", \"?\")}s)')
          "

      - name: Generate daily data with backfill
        env:
          ZENDESK_SUBDOMAIN: positivegrid
          ZENDESK_EMAIL: ${{ secrets.ZENDESK_EMAIL }}
          ZENDESK_API_TOKEN: ${{ secrets.ZENDESK_TOKEN }}
          ZENDESK_TOKEN: ${{ secrets.ZENDESK_TOKEN }}
          CLAUDE_DIR: claude-workspace
        run: |
          INPUT_DATE="${{ github.event.inputs.date || '' }}"
          mkdir -p data/daily

          generate_day() {
            local DATE="$1"
            local OUTPUT="data/daily/${DATE}.json"

            # Skip if file already exists with valid data (>100 bytes)
            if [ -f "$OUTPUT" ] && [ "$(wc -c < "$OUTPUT")" -gt 100 ]; then
              echo "  ✓ $DATE — already exists, skipping"
              return 0
            fi

            echo "  → Generating $DATE..."
            local TMP
            TMP=$(mktemp)
            if python3 scripts/generate-daily-data.py --json --date "$DATE" > "$TMP" 2>/dev/null; then
              if [ -s "$TMP" ] && python3 -m json.tool "$TMP" > /dev/null 2>&1; then
                local TOTAL
                TOTAL=$(python3 -c "import json; print(json.load(open('$TMP'))['kpi']['totalTickets'])")
                if [ "$TOTAL" != "0" ]; then
                  mv "$TMP" "$OUTPUT"
                  echo "    ✓ Saved ($TOTAL tickets)"
                  return 0
                else
                  echo "    ⚠ 0 tickets — skipped (weekend or data issue)"
                  rm -f "$TMP"
                  return 1
                fi
              fi
            fi
            echo "    ✗ Failed — skipped"
            rm -f "$TMP"
            return 1
          }

          if [ -n "$INPUT_DATE" ]; then
            # Manual trigger: generate specific date only
            echo "=== Generating specific date: $INPUT_DATE ==="
            generate_day "$INPUT_DATE"
          else
            # Scheduled run: generate yesterday + backfill last 7 days
            YESTERDAY=$(python3 -c "
          from datetime import datetime, timedelta, timezone
          tpe = timezone(timedelta(hours=8))
          yesterday = datetime.now(tpe) - timedelta(days=1)
          print(yesterday.strftime('%Y-%m-%d'))
          ")

            echo "=== Daily Data Generation (with backfill) ==="
            echo "Yesterday: $YESTERDAY"
            echo ""

            # Generate yesterday first (most important)
            echo "--- Yesterday ---"
            generate_day "$YESTERDAY"
            echo ""

            # Backfill: check last 7 days for missing data
            echo "--- Backfill check (last 7 days) ---"
            python3 -c "
          from datetime import datetime, timedelta, timezone
          tpe = timezone(timedelta(hours=8))
          today = datetime.now(tpe).date()
          for i in range(2, 8):
              d = today - timedelta(days=i)
              print(d.strftime('%Y-%m-%d'))
          " | while read -r DATE; do
              generate_day "$DATE"
            done
          fi

      - name: Update index
        run: python3 scripts/update-index.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "data: daily update $(date -u +%Y-%m-%d)"
          git push

  deploy:
    needs: update-daily
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
